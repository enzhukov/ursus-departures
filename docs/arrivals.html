<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Back to Ursus</title>
  <meta name="theme-color" content="#0b0e11">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="← Ursus">
  <link rel="manifest" href="manifest-arrivals.json">
  <link rel="apple-touch-icon" href="icon-arrivals-180.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div id="date">&nbsp;</div>
    <div class="right">
      <span id="clock">--:--</span>
      <a class="swap" href="./" aria-label="Odjazdy z Ursusa">⇄</a>
    </div>
  </header>

  <div class="controls">
    <select id="origin" aria-label="Stacja początkowa">
      <option value="WO">Warszawa Ochota</option>
      <option value="WZ">Warszawa Zachodnia</option>
      <option value="WS">Warszawa Śródmieście</option>
      <option value="WP">Warszawa Powiśle</option>
      <option value="WST">Warszawa Stadion</option>
      <option value="WW">Warszawa Wschodnia</option>
    </select>
  </div>

  <main id="board" aria-live="polite">
    <div class="empty">Ładowanie rozkładu…</div>
  </main>

  <footer id="status">&nbsp;</footer>

  <script src="arrivals.js"></script>
</body>
</html>
